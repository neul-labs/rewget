[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rewget"
version = "1.0.1"
description = "wget-compatible wrapper with automatic fallback for blocked requests"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.8"
authors = [
    { name = "Neul Labs" },
]
keywords = ["wget", "http", "download", "cli", "bot-detection", "tls-impersonation", "cloudflare"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Operating System :: MacOS",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: System :: Networking",
    "Topic :: Utilities",
]

[project.scripts]
rewget = "rewget.cli:main"
rewgetd = "rewget.cli:main_daemon"

[project.urls]
Homepage = "https://github.com/neul-labs/rewget"
Documentation = "https://docs.neullabs.com/rewget"
Repository = "https://github.com/neul-labs/rewget"
Issues = "https://github.com/neul-labs/rewget/issues"

[tool.hatch.build.targets.wheel]
packages = ["rewget"]
