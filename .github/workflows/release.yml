name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: rewget ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    name: Build Release (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rewget-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: rewget-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: rewget-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rewget-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package release (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PKG_DIR="target/pkg/${{ matrix.artifact }}"
          mkdir -p "$PKG_DIR"
          cp "target/${{ matrix.target }}/release/rewget" "$PKG_DIR/"
          cp "target/${{ matrix.target }}/release/rewgetd" "$PKG_DIR/"
          cp README.md "$PKG_DIR/"
          cp LICENSE "$PKG_DIR/" 2>/dev/null || true
          if [ -f "target/${{ matrix.target }}/release/build/rewget-"*/out/man/rewget.1 ]; then
            cp target/${{ matrix.target }}/release/build/rewget-*/out/man/rewget.1 "$PKG_DIR/"
          fi
          cd target/pkg
          tar -czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"
          sha256sum "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256"
          echo "SHA256=$(cat ${{ matrix.artifact }}.tar.gz.sha256 | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/pkg/${{ matrix.artifact }}.tar.gz
            target/pkg/${{ matrix.artifact }}.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get crates.io token via OIDC
        id: crates_token
        uses: actions/github-script@v7
        with:
          script: |
            const idToken = await core.getIDToken('https://crates.io');
            const res = await fetch('https://crates.io/api/v1/me/tokens', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${idToken}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                name: `github-actions-${context.runId}`,
                scopes: ['publish-update']
              })
            });
            if (!res.ok) throw new Error(`crates.io token exchange failed: ${res.status}`);
            const data = await res.json();
            core.setSecret(data.token);
            core.setOutput('token', data.token);

      - name: Publish rewget-core
        run: cargo publish -p rewget-core --token ${{ steps.crates_token.outputs.token }}
        continue-on-error: true

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish rewgetd
        run: cargo publish -p rewgetd --token ${{ steps.crates_token.outputs.token }}
        continue-on-error: true

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish rewget
        run: cargo publish -p rewget --token ${{ steps.crates_token.outputs.token }}
        continue-on-error: true

  publish-npm:
    name: Publish to npm
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set package version
        working-directory: packages/npm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version "$VERSION" --no-git-tag-version

      - name: Publish to npm with provenance
        working-directory: packages/npm
        run: npm publish --provenance --access public
        continue-on-error: true

  publish-pypi:
    name: Publish to PyPI
    needs: build-release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: packages/pypi
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/pypi/dist
        continue-on-error: true

  update-homebrew:
    name: Update Homebrew Tap
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: neul-labs/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Download release artifacts and compute SHA256s
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd homebrew-tap

          PLATFORMS=(
            "rewget-macos-x64:x86_64-apple-darwin"
            "rewget-macos-arm64:aarch64-apple-darwin"
            "rewget-linux-x64:x86_64-unknown-linux-gnu"
            "rewget-linux-arm64:aarch64-unknown-linux-gnu"
          )

          SHA_MACOS_X64=""
          SHA_MACOS_ARM64=""
          SHA_LINUX_X64=""
          SHA_LINUX_ARM64=""

          for entry in "${PLATFORMS[@]}"; do
            ARTIFACT="${entry%%:*}"
            PLATFORM="${entry##*:}"
            URL="https://github.com/neul-labs/rewget/releases/download/v${VERSION}/${ARTIFACT}.tar.gz"
            curl -sSL "$URL" -o "/tmp/${ARTIFACT}.tar.gz"
            SHA=$(sha256sum "/tmp/${ARTIFACT}.tar.gz" | cut -d' ' -f1)
            case "$ARTIFACT" in
              rewget-macos-x64) SHA_MACOS_X64="$SHA" ;;
              rewget-macos-arm64) SHA_MACOS_ARM64="$SHA" ;;
              rewget-linux-x64) SHA_LINUX_X64="$SHA" ;;
              rewget-linux-arm64) SHA_LINUX_ARM64="$SHA" ;;
            esac
          done

          cat > Formula/rewget.rb <<'EOF'
class Rewget < Formula
  desc "wget-compatible wrapper with automatic fallback"
  homepage "https://github.com/neul-labs/rewget"
  version "${VERSION}"
  license "MIT"

  on_macos do
    if Hardware::CPU.intel?
      url "https://github.com/neul-labs/rewget/releases/download/v${VERSION}/rewget-macos-x64.tar.gz"
      sha256 "${SHA_MACOS_X64}"
    else
      url "https://github.com/neul-labs/rewget/releases/download/v${VERSION}/rewget-macos-arm64.tar.gz"
      sha256 "${SHA_MACOS_ARM64}"
    end
  end

  on_linux do
    if Hardware::CPU.intel?
      url "https://github.com/neul-labs/rewget/releases/download/v${VERSION}/rewget-linux-x64.tar.gz"
      sha256 "${SHA_LINUX_X64}"
    else
      url "https://github.com/neul-labs/rewget/releases/download/v${VERSION}/rewget-linux-arm64.tar.gz"
      sha256 "${SHA_LINUX_ARM64}"
    end
  end

  depends_on "wget"

  def install
    bin.install "rewget"
    bin.install "rewgetd"
    generate_completions_from_executable(bin/"rewget", "--rewget-completions")
    man1.install "rewget.1" if File.exist?("rewget.1")
  end

  test do
    assert_match "rewget #{version}", shell_output("#{bin}/rewget --rewget-version")
  end
end
EOF

      - name: Commit and push formula update
        working-directory: homebrew-tap
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rewget.rb
          git diff --cached --quiet || (git commit -m "Update rewget to v${VERSION}" && git push)
