site_name: rwget
docs_dir: documentation
site_description: wget-compatible wrapper with automatic fallback for blocked requests
site_author: Dipankar Das
site_url: https://rwget.dev

repo_name: dipankardas011/rwget
repo_url: https://github.com/dipankardas011/rwget

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
  - User Guide:
    - Basic Usage: usage.md
    - Configuration: configuration.md
    - Browser Profiles: profiles.md
  - Reference:
    - CLI Reference: cli-reference.md
    - How It Works: how-it-works.md
    - Architecture: architecture.md
  - Help:
    - Troubleshooting: troubleshooting.md
    - FAQ: faq.md
    - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dipankardas011/rwget
  version:
    provider: mike

copyright: Copyright &copy; 2026 Dipankar Das
